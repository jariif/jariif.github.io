<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Focshift — Free</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cyan: #00e5ff;
      --blue: #1565c0;
      --dark: #080b10;
      --card: #111620;
      --border: #1e2a3a;
      --text: #e0e8f0;
      --muted: #7a8fa6;
    }

    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 1;
      transition: opacity 0.6s ease;
    }

    body.fade-out { opacity: 0; }

    .container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      max-width: 480px;
      width: 100%;
    }

    /* GLOW CIRCLE */
    .glow-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.25) 0%, rgba(21,101,192,0.1) 60%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .glow-circle svg {
      width: 44px;
      height: 44px;
      stroke: var(--cyan);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0,229,255,0.2); }
      50% { box-shadow: 0 0 50px rgba(0,229,255,0.45); }
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      line-height: 1.3;
      color: var(--text);
    }

    h1 span {
      background: linear-gradient(90deg, var(--cyan), #4fc3f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* NAME */
    .welcome-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .welcome-name span {
      color: var(--cyan);
      font-weight: 600;
    }

    .btn-cyan-glow {
      display: inline-block;
      background: linear-gradient(90deg, var(--cyan), #4fc3f7);
      color: #080b10;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      padding: 16px 48px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0,229,255,0.5), 0 0 60px rgba(0,229,255,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-cyan-glow:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 50px rgba(0,229,255,0.7), 0 0 80px rgba(0,229,255,0.3);
    }

    .plan-badge {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 5px 16px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="glow-circle">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>

    <span class="plan-badge">Free Plan</span>

    <h1>Your product is<br/><span>activated and Ready</span></h1>

    <p class="welcome-name">Welcome, <span id="userName">there</span> 👋</p>

    <p class="subtitle">Your 7 Days Focus Reset starts now.<br/>Stay consistent. Stay focused.</p>

    <button class="btn-cyan-glow" onclick="goStart()">Get Started</button>

  </div>

  <script>
    // Show saved name
    const name = localStorage.getItem('focshift_name');
    if (name) {
      document.getElementById('userName').textContent = name;
    }

    // Fade out then redirect
    function goStart() {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = 'day1free.html';
      }, 600);
    }
  </script>

</body>
</html>
